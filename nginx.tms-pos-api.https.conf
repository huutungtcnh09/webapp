server {
    listen 80;
    listen [::]:80;
    server_name tms.name.vn pos.tms.name.vn api.tms.name.vn;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name tms.name.vn;

    ssl_certificate /etc/letsencrypt/live/tms.name.vn/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/tms.name.vn/privkey.pem;

    root /var/www/sites/tms;
    index index.html;

    location / {
        try_files $uri /index.html;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name pos.tms.name.vn;

    ssl_certificate /etc/letsencrypt/live/pos.tms.name.vn/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/pos.tms.name.vn/privkey.pem;

    root /var/www/sites/pos;
    index index.html;

    location / {
        try_files $uri /index.html;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name api.tms.name.vn;

    ssl_certificate /etc/letsencrypt/live/api.tms.name.vn/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.tms.name.vn/privkey.pem;

    client_max_body_size 20m;

    location / {
        proxy_pass http://127.0.0.1:5000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
